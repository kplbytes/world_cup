# Model configuration parameters for the World Cup prediction system.
# Each model_version maps to a named config set.
# Parameters are consumed by poisson.py predict_match_with_config().

elo_poisson_base:
  elo_scale: 400            # Controls how Elo differences translate to strength gaps
  base_goal_mean_home: 1.25 # Base expected goals for home team
  base_goal_mean_away: 1.10 # Base expected goals for away team
  strength_coeff_home: 0.90 # How much strength delta affects home xG
  strength_coeff_away: 0.75 # How much strength delta affects away xG (negative direction)
  home_advantage: 0.0       # Neutral venue = 0
  draw_boost: 1.00          # Multiplier on draw probability after Poisson (1.00 = no boost)
  favorite_dampening: 0.00  # Reduce max prob by this factor * (max_prob - 0.33)
  underdog_boost: 0.00      # Add to min(home_win, away_win) probability before renorm
  recent_form_weight: 0.0   # Weight for recent form delta
  market_blend_weight: 0.00 # Blend with market odds (0 = pure model, 1 = pure market)
  numerical_adjustment_weight: 1.00  # Scale factor for numerical adjustments
  max_xg_delta: 3.50        # Maximum xG after adjustments
  min_xg: 0.20              # Minimum xG
  poisson_dispersion: 1.00  # Dispersion multiplier for Poisson (>1 = more variance)
  upset_factor: 0.00        # Add to underdog tail probability (merged into underdog_boost at runtime)
  smart_market_blend: true   # Increase market weight when model and market disagree on direction
  dynamic_draw_boost: true   # Apply dynamic draw calibration based on Elo closeness + market signals
  profile_weight: 0.0        # Weight for team profile features (0 = disabled, 1 = full)
  profile_adjust_attack_defense: false
  profile_adjust_form: false
  fifa_rank_weight: 0.15     # Weight for FIFA rank signal (0 = disabled)

# Named model version configs
model_versions:
  elo-poisson-v1:
    _base: elo_poisson_base
    description: "Baseline Elo + Poisson model"

  elo-poisson-v1-drawboost:
    _base: elo_poisson_base
    draw_boost: 1.10
    description: "Draw probability boosted by 10% for group stage draws"

  elo-poisson-v1-drawboost-high:
    _base: elo_poisson_base
    draw_boost: 1.15
    description: "Draw probability boosted by 15% (aggressive)"

  elo-poisson-v1-favorite-dampened:
    _base: elo_poisson_base
    favorite_dampening: 0.10
    description: "Dampen favorite overconfidence by 10%"

  elo-poisson-v1-upset:
    _base: elo_poisson_base
    underdog_boost: 0.05   # merged: was 0.03 + upset_factor 0.02
    upset_factor: 0.00
    description: "Boost underdog probability and tail events"

  elo-poisson-v1-upset-aggressive:
    _base: elo_poisson_base
    underdog_boost: 0.10   # merged: was 0.06 + upset_factor 0.04
    upset_factor: 0.00
    favorite_dampening: 0.05
    description: "Aggressive underdog boost with mild favorite dampening"

  elo-poisson-v1-market-lite:
    _base: elo_poisson_base
    market_blend_weight: 0.15
    description: "Blend 15% market odds for probability calibration"

  elo-poisson-v1-market-medium:
    _base: elo_poisson_base
    market_blend_weight: 0.25
    description: "Blend 25% market odds"

  elo-poisson-v1-intel-numeric:
    _base: elo_poisson_base
    numerical_adjustment_weight: 1.00
    description: "Use experimental injury/suspension numerical adjustments"

  elo-poisson-v2-calibrated:
    _base: elo_poisson_base
    draw_boost: 1.08
    favorite_dampening: 0.05
    underdog_boost: 0.02
    market_blend_weight: 0.10
    description: "Calibrated v2: mild draw boost + favorite dampening + market blend"

  # --- Research-enhanced model configs ---
  elo-poisson-v2-research:
    _base: elo_poisson_base
    draw_boost: 1.08
    favorite_dampening: 0.05
    underdog_boost: 0.02
    market_blend_weight: 0.25
    smart_market_blend: true
    dynamic_draw_boost: true
    description: "Research v2: odds-weighted (25%) + dynamic draw calibration + smart blend"

  elo-poisson-v2-research-aggressive:
    _base: elo_poisson_base
    draw_boost: 1.12
    favorite_dampening: 0.08
    underdog_boost: 0.03
    market_blend_weight: 0.35
    smart_market_blend: true
    dynamic_draw_boost: true
    description: "Research v2 aggressive: heavy odds weight (35%) + strong draw boost"

  # --- V3: Profile-enhanced model ---
  elo-poisson-v3-profile:
    _base: elo_poisson_base
    draw_boost: 1.08
    favorite_dampening: 0.05
    underdog_boost: 0.02
    market_blend_weight: 0.25
    smart_market_blend: true
    dynamic_draw_boost: true
    profile_weight: 0.15
    profile_adjust_attack_defense: true
    profile_adjust_form: true
    fifa_rank_weight: 0.10
    description: "V3: Team profile-enhanced with FIFA rank + attack/defense + form integration"
