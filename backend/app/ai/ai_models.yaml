# AI Models Configuration
# This file defines all available AI prediction models.
# Add new providers and models here - no code changes needed.

providers:
  deepseek:
    enabled: true
    api_key_env: DEEPSEEK_API_KEY
    base_url_env: DEEPSEEK_BASE_URL
    default_timeout_seconds: 30
    default_temperature: 0
    max_retries: 2
    models:
      - model_id: deepseek-v4-flash
        enabled: true
        model_version: ai-deepseek-v4-flash-v1
        display_name: DeepSeek V4 Flash
        cost_tier: low
        latency_tier: fast
        role: fast_baseline
        ensemble_weight: 0.33
        prompt_version: worldcup-ai-v1

      - model_id: deepseek-v4-pro
        enabled: true
        model_version: ai-deepseek-v4-pro-v1
        display_name: DeepSeek V4 Pro
        cost_tier: high
        latency_tier: slow
        role: reasoning_strong
        ensemble_weight: 0.67
        prompt_version: worldcup-ai-v1

      - model_id: deepseek-v4-flash
        enabled: true
        model_version: ai-deepseek-v4-flash-v2
        display_name: DeepSeek V4 Flash (Independent)
        cost_tier: low
        latency_tier: fast
        role: independent_judge
        ensemble_weight: 0.33
        prompt_version: worldcup-ai-v2
        include_in_ensemble: true

      - model_id: deepseek-v4-pro
        enabled: false
        model_version: ai-deepseek-v4-pro-v2
        display_name: DeepSeek V4 Pro (Independent)
        cost_tier: high
        latency_tier: slow
        role: shadow
        ensemble_weight: 0
        prompt_version: worldcup-ai-v2
        include_in_ensemble: false

